name: Sync Upstream

on:
  schedule:
    - cron: "0 */6 * * *"   # 每 6 小时自动同步一次
  workflow_dispatch:        # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/linuxhsj/openclaw-zero-token.git
          git fetch upstream

      - name: Merge upstream/main into your main
        run: |
          git checkout main
          git merge upstream/main --no-edit || true

      - name: Push changes
        run: |
          git push origin main
